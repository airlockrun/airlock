# Pre-merge / pre-tag CI: vet + test on every push to main and every PR.
#
# Catches the bugs that publish-images.yml — which only runs on tag push
# and only does docker build — would notice too late. Specifically:
#   - go vet drift (unreachable code, shadowed vars, struct-tag typos)
#   - test failures from refactors that weren't reflected in tests
#   - drift check (Dockerfile ARG ↔ go.mod ↔ compose tag ↔ README pin)
#
# These are all things release-airlock.sh runs locally as preflight, but
# we want the same gate on every push and every external contributor's
# PR — not just at tag time.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Drift check has no toolchain dependency; bash + awk only.
      - name: check-versions
        run: ./scripts/check-versions.sh

  migrations:
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: the immutability check compares migrations
      # against the latest final release tag. Default shallow checkout
      # has no tags and the check would pass vacuously.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: check-migrations
        run: ./scripts/check-migrations.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # gofmt doesn't compile or fetch deps — skip the module cache.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-formatted:"
            echo "$unformatted"
            echo "run: gofmt -w ."
            exit 1
          fi

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The scaffold integration test shells out to `templ generate` on
       # the materialized template, so the templ CLI must be on PATH at
       # the same version the test's synthesized go.mod pins.
      - name: install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.865
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
