# Pre-merge / pre-tag CI: vet + test on every push to main and every PR.
#
# Catches the bugs that publish-images.yml — which only runs on tag push
# and only does docker build — would notice too late. Specifically:
#   - go vet drift (unreachable code, shadowed vars, struct-tag typos)
#   - test failures from refactors that weren't reflected in tests
#   - drift check (Dockerfile ARG ↔ go.mod ↔ compose tag ↔ README pin)
#
# These are all things release-airlock.sh runs locally as preflight, but
# we want the same gate on every push and every external contributor's
# PR — not just at tag time.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # check-versions.sh reads agentsdk/scaffold/versions.go (the frontend
      # toolchain source of truth), so the agentsdk module must be in the cache.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: fetch modules (agentsdk scaffold for the drift check)
        run: go mod download github.com/airlockrun/agentsdk
      - name: check-versions
        run: ./scripts/check-versions.sh

  migrations:
    runs-on: ubuntu-latest
    steps:
      # Full history + tags: the immutability check compares migrations
      # against the latest final release tag. Default shallow checkout
      # has no tags and the check would pass vacuously.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: check-migrations
        run: ./scripts/check-migrations.sh

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Fails the build if any dependency compiled into the airlock binary
      # carries a non-permissive (copyleft / source-available) or unrecognised
      # license. The agent-side scan + notices-freshness run in the pre-commit
      # hook — they need the sibling agentsdk checkout, absent in this
      # airlock-only CI checkout.
      - name: check-licenses
        run: ./scripts/check-licenses.sh

  frontend-licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: enable pnpm
        # Pin the project's pnpm explicitly: newer corepack defaults to pnpm 11
        # and refuses to auto-switch down to the packageManager pin.
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: install frontend deps
        run: pnpm -C frontend install --frozen-lockfile
      # Gates the bundled SPA's npm dependency licenses against the same allowlist.
      - name: check frontend licenses
        run: pnpm -C frontend run check:licenses

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # gofmt doesn't compile or fetch deps — skip the module cache.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-formatted:"
            echo "$unformatted"
            echo "run: gofmt -w ."
            exit 1
          fi

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The scaffold integration test shells out to `templ generate` on
       # the materialized template, so the templ CLI must be on PATH at
       # the same version the test's synthesized go.mod pins.
      - name: install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020
      - name: go vet
        run: go vet ./...
      # airlockvet runs the airlock-specific static checks (nodbq +
      # writeproto in api/, agentwire in agentapi/). multichecker exits
      # non-zero whenever any analyzer reports a diagnostic, so a single
      # un-annotated violation is enough to fail the build.
      - name: airlockvet
        run: go run ./cmd/airlockvet ./api/... ./agentapi/...
      - name: go test
        run: go test ./...
