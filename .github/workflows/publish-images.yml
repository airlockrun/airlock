# Publish all four airlock images to ghcr.io: airlock,
# airlock-agent-builder, airlock-agent-base, airlock-frontend.
#
# Reusable-only. The single sanctioned entry point is release.yml, which
# gates (drift + migration immutability + vet/test/build) BEFORE the tag
# is created, then calls this. There is intentionally no `on: push: tags`
# trigger: a tag ruleset forbids un-gated tag creation, and a workflow-
# created tag would not fire a push trigger anyway (GITHUB_TOKEN does not
# fan out). workflow_dispatch is kept only as a manual re-run if a publish
# fails midway after the tag already exists.
#
# Tag scheme: every image gets the release version (e.g. v0.4.0) plus
# `latest`. Operators pin with AIRLOCK_VERSION=v0.4.0 in .env; unset
# defaults to `latest`.

name: publish-images

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (vX.Y.Z) — must be an existing tag'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to (re)publish, e.g. v0.4.0'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: airlock
            dockerfile: Dockerfile.airlock
          - name: airlock-agent-builder
            dockerfile: Dockerfile.agent-builder
          - name: airlock-agent-base
            dockerfile: Dockerfile.agent-base
          - name: airlock-frontend
            dockerfile: Dockerfile.frontend
    steps:
      # Build the exact tagged tree. The tag exists by now: release.yml's
      # publish job is `needs: tag`, and on manual re-run the operator
      # passes an already-pushed tag.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      # check-versions.sh reads agentsdk/scaffold/versions.go (the frontend
      # toolchain source of truth after scaffold moved into agentsdk), which a
      # standalone airlock checkout only has once the agentsdk module is cached.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: fetch modules (agentsdk scaffold for the drift check)
        run: go mod download github.com/airlockrun/agentsdk

      # Validate version invariants before building. Catches stale
      # Dockerfile.agent-builder ARG defaults vs go.mod and compose
      # `:vX.Y.Z` tags that don't match the release tag.
      - name: Validate version invariants
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: ./scripts/check-versions.sh

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/airlockrun/${{ matrix.name }}:${{ inputs.version }}
            ghcr.io/airlockrun/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
