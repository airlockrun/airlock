# Publish all four airlock images to ghcr.io on every v* tag:
# airlock, airlock-agent-builder, airlock-agent-base, airlock-frontend.
#
# All four are pre-published so a fresh self-host bringup is a pure
# `docker compose pull` — no Go toolchain, no Node, no apt install on
# the operator's VPS. The compose file keeps the `build:` blocks as
# fallbacks for development against this repo.
#
# Tag scheme: every image gets the git tag (e.g. v0.1.5) plus `latest`.
# Operators pin a specific release with AIRLOCK_VERSION=v0.1.5 in .env;
# unset defaults to `latest`, so `docker compose pull` always grabs
# the newest published set.

name: publish-images

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # manual re-run if a tag publish fails midway

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: airlock
            dockerfile: Dockerfile.airlock
          - name: airlock-agent-builder
            dockerfile: Dockerfile.agent-builder
          - name: airlock-agent-base
            dockerfile: Dockerfile.agent-base
          - name: airlock-frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      # Validate version invariants before building. Catches stale
      # Dockerfile.agent-builder ARG defaults vs go.mod (which silently
      # bakes wrong lib source — see v0.2.1 incident) and compose
      # `:vX.Y.Z` tags that don't match the release tag.
      - name: Validate version invariants
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./scripts/check-versions.sh

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ${{ github.ref_name }} is the tag (e.g. "v0.1.5") on a tag push.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/airlockrun/${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/airlockrun/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
