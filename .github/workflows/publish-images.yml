# Publish airlock + agent-builder images to ghcr.io on every v* tag.
#
# Frontend and agent-base are intentionally not published — they build
# in seconds against operator hardware, so the operator-side `--build`
# fallback in docker-compose.yml is fine for them. agent-builder is
# the slow one (Go toolchain + 5 modules from the proxy + 4 CLI
# binaries) — pre-publishing collapses a multi-minute fresh-server
# bringup into a `docker compose pull`.
#
# Tag scheme: every image gets the git tag (e.g. v0.1.5) plus `latest`.
# Operators pin a specific release with AIRLOCK_VERSION=v0.1.5 in .env;
# unset defaults to `latest`, so `docker compose pull` always grabs
# the newest published set.

name: publish-images

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # manual re-run if a tag publish fails midway

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: airlock
            dockerfile: Dockerfile.airlock
          - name: airlock-agent-builder
            dockerfile: Dockerfile.agent-builder
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ${{ github.ref_name }} is the tag (e.g. "v0.1.5") on a tag push.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/airlockrun/${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/airlockrun/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
