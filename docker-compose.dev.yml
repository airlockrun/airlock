# Native development overlay. `make dev` runs Airlock on the host, so expose
# bundled infrastructure only on loopback for the native process to reach it.
services:
  postgres:
    ports:
      - "127.0.0.1:${DB_PORT_HOST:?set DB_PORT_HOST for native development}:5432"

  rustfs:
    ports:
      - "127.0.0.1:${S3_PORT_HOST:?set S3_PORT_HOST for native development}:9000"
