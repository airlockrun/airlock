syntax = "proto3";

package airlock.v1;

option go_package = "github.com/airlockrun/airlock/gen/airlock/v1;airlockv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Field ordering convention within each message (mirrors the DB schema):
//   1. id + foreign keys (parent refs)
//   2. unique business key (slug, provider_id, email, ...)
//   3. identity (name, display_name, title, description)
//   4. type / status / flags
//   5. domain-specific data
//   6. secrets and credentials
//   7. JSON / struct payloads
//   8. diagnostics
//   9. runtime timestamps (last_*_at, started_at, finished_at, expires_at)
//  10. audit timestamps (created_at, updated_at)

// TenantRole defines the role a user has within a tenant.
// Hierarchy: admin > manager > user.
enum TenantRole {
  TENANT_ROLE_UNSPECIFIED = 0;
  TENANT_ROLE_ADMIN = 1;
  TENANT_ROLE_MANAGER = 2;
  TENANT_ROLE_USER = 3;
}

// MessageRole maps to LLM message roles.
enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_ASSISTANT = 2;
  MESSAGE_ROLE_SYSTEM = 3;
  MESSAGE_ROLE_TOOL = 4;
}

// Tenant represents a workspace (organization).
message Tenant {
  string id = 1;
  string slug = 2;
  string name = 3;
  google.protobuf.Struct settings = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// User represents an authenticated user.
message User {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string display_name = 4;
  TenantRole tenant_role = 5;
  string oidc_sub = 6;
  bool must_change_password = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// UserSummary is a slim user view used for member-picker dropdowns.
// Returned to any authenticated user — no admin gate — so it intentionally
// omits oidc_sub / must_change_password / role.
message UserSummary {
  string id = 1;
  string email = 2;
  string display_name = 3;
}

// Provider represents a configured LLM provider with encrypted API key.
message Provider {
  string id = 1;
  string provider_id = 2;
  string display_name = 3;
  bool is_enabled = 4;
  string base_url = 5;
  string api_key_masked = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  // slug disambiguates rows that share a provider_id (multi-key
  // support: "openai/personal" + "openai/team-acme"). Required.
  // Auto-derived from display_name on the client (kebab-case); user
  // can override.
  string slug = 9;
}

// ProviderInfo represents a known LLM provider from the catalog.
message ProviderInfo {
  string id = 1;
  string name = 2;
}

// ProviderCapabilityInfo describes what capabilities a known provider offers
// and whether the user has it configured. Returned by
// GET /api/v1/catalog/capabilities.
message ProviderCapabilityInfo {
  string provider_id = 1;
  string display_name = 2;
  // Supported capabilities from: "text", "vision", "transcription",
  // "speech", "image_gen", "embedding", "reranking", "search".
  repeated string capabilities = 3;
  // true when the user has an enabled row in the providers table for this provider_id.
  bool configured = 4;
  // true when the provider isn't present in models.dev and is only known via our
  // hand-maintained overlay (e.g. brave, deepgram).
  bool catalog_only = 5;
}

// ModelInfo represents a model available from a provider.
message ModelInfo {
  string id = 1;
  string provider_id = 2;
  string name = 3;
  bool tool_call = 4;
  bool reasoning = 5;
  int32 context_limit = 6;
  int32 output_limit = 7;
  double cost_input = 8;
  double cost_output = 9;
  // Kind is the model's primary purpose, sourced from goai's typed lists.
  // One of "language", "embedding", "image", "speech", "transcription",
  // "reranking", or "" when sol has no goai coverage for the provider —
  // currently the openai-compat bucket (groq, xai, cerebras, fireworks,
  // etc.), all of which ship language models, so clients can safely
  // treat empty as "language" for filtering purposes.
  string kind = 10;
  // Per-model capability flags computed by sol's CapabilitiesFromModel
  // (kind-derived plus modality-derived). The strings match
  // ProviderCapabilityInfo.capabilities — "text", "vision", "embedding",
  // "speech", "transcription", "image_gen", "reranking". Used by the
  // frontend to compose sub-filters within a kind (e.g. vision picker =
  // language model with vision cap).
  repeated string caps = 11;
}

// --- Agents ---

// AgentInfo represents a compiled AI agent.
message AgentInfo {
  string id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  string status = 5;           // "draft", "building", "active", "failed", "stopped"
  string upgrade_status = 6;   // "idle", "queued", "building", "failed"
  bool auto_fix = 7;
  // build_model / exec_model carry only the bare model name now
  // (e.g. "gpt-5"). The associated provider row is named via
  // build_provider_id / exec_provider_id (UUID-as-string). Empty +
  // empty means "inherit system default for this slot".
  string build_model = 8;
  string exec_model = 9;
  string error_message = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  string build_provider_id = 13;
  string exec_provider_id = 14;
  // running reflects live container state (a container is actually up),
  // distinct from status (lifecycle: draft/building/active/failed/
  // stopped). An 'active' agent with running=false is normal — idle
  // containers are reaped and lazily restarted on the next trigger.
  // Populated only on the agent-detail endpoint.
  bool running = 15;
  // emoji is an optional decorative glyph (agentsdk.Config.Emoji) shown
  // next to the agent in the UI. Empty = none.
  string emoji = 16;
  // your_access is the caller's effective access level on this agent —
  // "admin", "user", or "public" (matches agentsdk.Access). Populated
  // by the operator-facing list/detail endpoints so the UI and the
  // in-airlock system agent can locally decide which per-agent actions
  // to offer without re-authorizing each one. Empty when the caller
  // axis is not user-scoped (e.g. agent-internal lookups).
  string your_access = 17;
  // source_ref is the git commit hash of the build the agent is
  // currently running (agents.source_ref in the DB; set by Execute on
  // every successful build/upgrade/rollback). The UI compares against
  // AgentBuildInfo.source_ref to decide which build row is "current"
  // (e.g. to hide the rollback button on it). Empty for agents that
  // have never had a successful build.
  string source_ref = 18;
}

// RunInfo represents a single execution of an agent.
message RunInfo {
  string id = 1;
  string agent_id = 2;
  string bridge_id = 3;
  string status = 4;            // "running", "completed", "failed", "timeout"
  string source_ref = 5;        // agent commit hash at time of run
  // Only populated in detail responses.
  google.protobuf.Struct input_payload = 6;
  google.protobuf.ListValue actions = 7;
  int32 llm_tokens_in = 8;
  int32 llm_tokens_out = 9;
  double llm_cost_estimate = 10;
  int32 duration_ms = 11;
  string stdout_log = 12;
  string error_message = 13;
  // error_kind classifies error_message: "platform" (provider/network),
  // "agent" (agent code bug), or "" (no error / unknown). Frontend uses
  // this to suppress the "Fix this error" workflow on platform errors.
  string error_kind = 14;
  string panic_trace = 15;
  google.protobuf.Timestamp started_at = 16;
  google.protobuf.Timestamp finished_at = 17;
}

// AgentBuildInfo represents a single build or upgrade of an agent.
message AgentBuildInfo {
  string id = 1;
  string agent_id = 2;
  string type = 3;               // "build", "upgrade", or "rollback"
  string status = 4;             // "building", "complete", "failed"
  string instructions = 5;
  string source_ref = 6;
  string image_ref = 7;
  string sol_log = 8;            // Only populated in detail responses.
  string docker_log = 9;         // Only populated in detail responses.
  int64 log_seq = 10;            // Highest log sequence number persisted; used for WS dedup.
  string error_message = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp finished_at = 13;
  // Codegen LLM telemetry, aggregated from the llm_usage ledger
  // (parity with RunInfo.llm_*). Zero for image-only rebuilds that ran
  // no codegen.
  int32 llm_calls = 14;
  int32 llm_tokens_in = 15;
  int32 llm_tokens_out = 16;
  double llm_cost_estimate = 17;
  // rollback_target_id is set only on type='rollback' rows — points at
  // the build we rolled back to so the UI can render "Rolled back to {X}".
  // Empty for build/upgrade rows.
  string rollback_target_id = 18;
  // rollback_target_source_ref is a denormalized convenience for the
  // builds list: the source_ref of the target build, when one is set.
  // Lets the row render the short commit hash without needing a second
  // fetch.
  string rollback_target_source_ref = 19;
  // sdk_version is the agentsdk version embedded at the moment this
  // build/upgrade/rollback completed. Empty for in-progress and failed
  // rows; rollback uses it to decide whether the target's code needs
  // an SDK migration pass.
  string sdk_version = 20;
}

// ConversationInfo represents an agent conversation.
message ConversationInfo {
  string id = 1;
  string agent_id = 2;
  string title = 3;
  string source = 4;            // "web", "telegram", etc.
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// AgentMessageInfo represents a single message in a conversation.
message AgentMessageInfo {
  string id = 1;
  // seq is the monotonic insertion-order axis on agent_messages. Used as the
  // pagination cursor instead of created_at because rows persisted in one
  // transaction (assistant + tool batch) share an identical created_at.
  int64 seq = 2;
  string role = 3;               // "user", "assistant", "system", "tool"
  string source = 4;             // "user" (default), "system" (injected by Airlock), "bridge", "error"
  string content = 5;
  string parts = 6;              // JSON-encoded goai Content for rich message display
  double cost_estimate = 7;
  google.protobuf.Timestamp created_at = 8;
  // run_id groups assistant + tool rows produced by the same run so the UI
  // can fold a multi-step run_js loop back into a single bubble — the live
  // streaming path bundles them via finalizeMessage but the persisted shape
  // is one row per LLM step. Empty for user/system rows that don't belong
  // to a run.
  string run_id = 9;
}

// WebhookInfo represents a code-synced webhook registration.
message WebhookInfo {
  string id = 1;
  string path = 2;
  string verify_mode = 3;       // "none", "hmac", "token", "bearer", "ed25519"
  string public_url = 4;        // full public URL for external services
  string description = 5;
  string secret_masked = 6;     // masked secret (e.g., "abc...xyz")
  google.protobuf.Timestamp last_received_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

// CronInfo represents a code-synced cron registration.
message CronInfo {
  string id = 1;
  string name = 2;
  string schedule = 3;
  string description = 4;
  google.protobuf.Timestamp last_fired_at = 5;
  google.protobuf.Timestamp created_at = 6;
}

// RouteInfo represents a code-synced HTTP route registration.
message RouteInfo {
  string id = 1;
  string path = 2;
  string method = 3;
  string access = 4;
  string description = 5;
}

// --- Connections & Bridges ---

// ConnectionInfo shows a connection definition with credential status.
message ConnectionInfo {
  string id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  string auth_mode = 5;     // "oauth2", "api_key"
  string auth_url = 6;      // Airlock-hosted URL to start auth
  string setup_instructions = 7;
  bool authorized = 8;      // whether credentials exist and are valid
  bool has_oauth_app = 9;   // whether client_id/secret configured (oauth2 only)
  google.protobuf.Timestamp token_expires_at = 10;
  // Human-readable health warnings for an authorized-but-fragile
  // connection (e.g. no refresh token, or an expired token). Empty when
  // healthy; the UI shows a (!) indicator when non-empty.
  repeated string warnings = 11;
}

// BridgeInfo represents a chat platform bot instance.
message BridgeInfo {
  string id = 1;
  string agent_id = 2;      // empty when is_system is true
  UserSummary owner = 3;
  string type = 4;          // "telegram", "discord"
  string name = 5;
  string bot_username = 6;  // @handle from platform
  string status = 7;        // "active", "error"
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  BridgeSettings settings = 10;
  // True when inbound DMs route to the in-airlock sysagent instead of an
  // agent. Disjoint with agent_id — exactly one is set.
  bool is_system = 11;
}

// BridgeSettings is the user-tunable subset of bridge config exposed in
// the dashboard. Stored in bridges.settings JSONB on the backend.
message BridgeSettings {
  // When true, unauthenticated users can DM the bot at AccessPublic.
  // When false, unauth DMs are dropped (except /auth, which is the
  // explicit linking opt-in and always works).
  bool allow_public_dms = 1;

  // Inactivity window after which a public conversation is finalized
  // and deleted. 0 disables sweeping for this bridge. Only meaningful
  // when public_session_mode == "session".
  int32 public_session_ttl_seconds = 2;

  // How public conversations carry context across turns:
  //   "session"  — persistent, per-channel conversation; finalized by
  //                the sweeper after public_session_ttl_seconds.
  //   "one_shot" — fresh ephemeral conversation per turn; no history;
  //                deleted right after the run. The user's referenced
  //                message (reply / forward) is included as context.
  string public_session_mode = 3;

  // Wall-clock cap for a single public-DM prompt run, in seconds.
  // Authenticated users are not affected. 0 means "use the default"
  // (60 seconds).
  int32 public_prompt_timeout_seconds = 4;
}

// PlatformIdentityInfo represents a user's verified external identity.
// The owner_* fields are populated only on the admin variant of the
// identities list (caller holds TenantIdentityManageAll); regular users
// see them empty since the list is already scoped to themselves.
message PlatformIdentityInfo {
  string id = 1;
  string platform = 2;          // "telegram"
  string platform_user_id = 3;  // Telegram user ID
  google.protobuf.Timestamp created_at = 4;
  string owner_user_id = 5;
  string owner_email = 6;
  string owner_display_name = 7;
}

// ToolInfo represents a registered tool on an agent.
// InputSchema and OutputSchema are JSON-encoded JSON Schemas.
message ToolInfo {
  string id = 1;
  string name = 2;
  string description = 3;
  string access = 4;  // "admin", "user", "public"
  string input_schema = 5;
  string output_schema = 6;
}

// --- Build Events ---

// AgentBuildEvent carries build/upgrade lifecycle events.
message AgentBuildEvent {
  string agent_id = 1;
  string build_id = 2;
  string status = 3;   // "started", "complete", "failed", "cancelled"
  string error = 4;
}

// AgentBuildLogEvent carries a single build log line.
message AgentBuildLogEvent {
  string agent_id = 1;
  string build_id = 2;
  int64  seq = 3;       // monotonic per-build line counter (for frontend dedup)
  string stream = 4;    // "sol" | "docker"
  string line = 5;
}

// AgentSyncedEvent fires after the agent container completes a sync —
// frontend tabs that show synced surface (tools, webhooks, crons,
// routes, MCP servers, connections, model slots) refetch on this event
// so the user sees the new shape without a page reload.
message AgentSyncedEvent {
  string agent_id = 1;
}

// FileInfo describes a file in agent storage. Returned by listDir / statFile /
// writeFile (in run_js) and embedded in PromptRequest for chat uploads.
message FileInfo {
  string path = 1;            // S3-style storage path, e.g. "uploads/foo.png"
  string filename = 2;        // original upload name; preserved as S3 metadata
  string content_type = 3;
  int64 size = 4;
  string last_modified = 5;   // RFC3339
}

// TopicInfo represents a notification topic with subscription status.
message TopicInfo {
  string id = 1;
  string slug = 2;
  string description = 3;
  bool subscribed = 4;        // per-conversation subscription status
}

// SystemSettingsInfo mirrors the system_settings table (single-row, global).
// Per-capability default models are used wherever the system picks a model
// for a capability and no agent-specific override is set. Each slot pairs
// a model name with a provider row UUID (multi-key support); empty + empty
// means "no default configured for this capability".
// public_url / agent_domain are deliberately absent: they are env-only
// (PUBLIC_URL / AGENT_DOMAIN), shared with the bundled Caddy via .env, and
// never DB/UI-editable.
message SystemSettingsInfo {
  string default_build_model = 1;
  string default_exec_model = 2;
  string default_stt_model = 3;
  string default_vision_model = 4;
  string default_tts_model = 5;
  string default_image_gen_model = 6;
  string default_search_model = 7;
  string default_embedding_model = 8;
  string default_build_provider_id = 9;
  string default_exec_provider_id = 10;
  string default_stt_provider_id = 11;
  string default_vision_provider_id = 12;
  string default_tts_provider_id = 13;
  string default_image_gen_provider_id = 14;
  string default_search_provider_id = 15;
  string default_embedding_provider_id = 16;
  // Telegram Managed Bots: status of the admin-configured manager
  // bot (the one with can_manage_bots that the operator-side flow
  // uses to create new Telegram bots on behalf of users). The raw
  // token never leaves the server; the UI only sees the resolved
  // username + last-validation error.
  bool   telegram_manager_bot_configured = 17;
  string telegram_manager_bot_username   = 18;
  string telegram_manager_bot_error      = 19;
}

// ManagedBotSessionRequest creates a session row that correlates an
// airlock "Create new Telegram bot" click to the Bot API 9.6
// ManagedBotCreated callback. Exactly one of agent_id / is_system
// must be set.
message CreateManagedBotSessionRequest {
  string agent_id       = 1;
  bool   is_system      = 2;
  // Display name passed to Telegram on the deeplink (?name=…); the
  // user can change it during creation. Empty falls back to a default.
  string suggested_name = 3;
}

message CreateManagedBotSessionResponse {
  string nonce     = 1;
  string deep_link = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message UpdateTelegramManagerBotRequest {
  // Empty string disables the manager bot (clears the stored token).
  string token = 1;
}

message UpdateTelegramManagerBotResponse {
  bool   configured = 1;
  string username   = 2;
  string error      = 3;
}

// GitCredential is a per-user credential for accessing external git
// remotes (GitHub/GitLab/Bitbucket/self-hosted). The token itself is
// never returned from the API after creation — only metadata.
message GitCredential {
  string id = 1;
  string user_id = 2;
  string type = 3;                 // "pat" | (v2) "github_app"
  string name = 4;
  string github_install_id = 5;    // empty for type="pat"
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp last_used_at = 7;
}

// AgentGitConfig describes an agent's external git remote connection.
// All string fields are empty when the agent is in internal-only mode.
message AgentGitConfig {
  string agent_id = 1;
  string git_remote_url = 2;
  string git_credential_id = 3;
  string git_credential_name = 4;  // resolved from git_credentials.name for UI
  string default_branch = 5;
  string webhook_url = 6;          // fully-qualified URL the user pastes into their git provider
  string webhook_secret = 7;       // shown so the user can paste it into their provider settings
  string last_synced_ref = 8;
}

// MCPServerInfo is one row from ListMCPServers — agent-declared MCP
// servers with their authorization status and live tool count.
message MCPServerInfo {
  string id = 1;
  string slug = 2;
  string name = 3;
  string url = 4;
  string auth_mode = 5;
  bool authorized = 6;
  bool has_oauth_app = 7;
  int32 tool_count = 8;
  string auth_url = 9;                                 // airlock-hosted URL the operator visits to authorize; empty for non-interactive auth modes
  google.protobuf.Timestamp token_expires_at = 10;
  google.protobuf.Timestamp last_synced_at = 11;
}

// MCPStatusInfo is the lighter shape used by status-only endpoints
// (set/revoke/oauth-app) — no URL / sync metadata, just whether
// the MCP credential is currently configured.
message MCPStatusInfo {
  string slug = 1;
  string name = 2;
  string auth_mode = 3;
  bool authorized = 4;
}

// EnvVarInfo is one row from ListEnvVars. Value is populated only
// when !is_secret AND configured; secret values are never returned
// through any read endpoint.
message EnvVarInfo {
  string slug = 1;
  string description = 2;
  bool is_secret = 3;
  bool configured = 4;
  string default_value = 5;
  string pattern = 6;
  string value = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// SiblingInfo is one entry in an agent's A2A address book.
message SiblingInfo {
  string id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  bool allow_non_member_mcp = 5;
  bool allow_public_mcp = 6;
  google.protobuf.Timestamp created_at = 7;
}

// AddableSiblingInfo is a candidate the editing user can add to an
// agent's A2A address book. is_member tells the UI whether the
// editing user is already a member of the target (vs picking it
// purely because allow_non_member_mcp=true).
message AddableSiblingInfo {
  string id = 1;
  string slug = 2;
  string name = 3;
  string description = 4;
  bool allow_non_member_mcp = 5;
  bool is_member = 6;
}

// A2ASettings is the per-agent MCP-exposure toggles configured from
// the A2A settings page. Wire shape for get_agent_sharing /
// set_agent_sharing.
message A2ASettings {
  bool allow_non_member_mcp = 1;
  bool allow_public_mcp = 2;
}

// ExecEndpointInfo is one row from ListExecEndpoints — the
// operator-visible projection that strips the secrets-store
// private-key reference and surfaces only the host-key SHA256
// fingerprint (not the full blob).
message ExecEndpointInfo {
  string id = 1;
  string slug = 2;
  string description = 3;
  string llm_hint = 4;
  string access = 5;
  string transport = 6;
  string host = 7;
  int32 port = 8;
  string ssh_user = 9;
  string public_key_openssh = 10;
  string public_key_comment = 11;
  string host_key_fingerprint = 12;
  google.protobuf.Timestamp host_key_pinned_at = 13;
  google.protobuf.Timestamp last_used_at = 14;
}

// ExecEndpointTestResult is the parsed outcome of running `whoami`
// over the configured SSH transport. ok signals success at the
// transport+auth+host-key layer; non-zero exit_code with ok=true
// means the connection worked but the command failed.
message ExecEndpointTestResult {
  bool ok = 1;
  int32 exit_code = 2;
  int64 duration_ms = 3;
  string stdout = 4;
  string stderr = 5;
  string error = 6;
}

// SetupCountsInfo aggregates the setup-completeness counters
// across an agent's connections, MCP servers, and env vars. Used
// by the agent-card progress bar to flag agents whose operator
// hasn't finished setup.
message SetupCountsInfo {
  int32 connections = 1;
  int32 mcp_servers = 2;
  int32 env_vars = 3;
}
