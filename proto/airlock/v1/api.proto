syntax = "proto3";

package airlock.v1;

option go_package = "github.com/airlockrun/airlock/gen/airlock/v1;airlockv1";

import "airlock/v1/types.proto";
import "google/protobuf/timestamp.proto";

// --- Auth ---

message RegisterRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  string tenant_name = 4;
  string tenant_slug = 5;
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
  Tenant tenant = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
}

// --- Activation (single-tenant setup) ---

message ActivateRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  string activation_code = 4;
}

// ActivateResponse reuses RegisterResponse shape (tokens + user + tenant).

// --- User Management (admin) ---

message CreateUserRequest {
  string email = 1;
  string display_name = 2;
  string password = 3;
  string tenant_role = 4;
}

message CreateUserResponse {
  User user = 1;
  // One-time temporary password generated for the new user, shown to the
  // admin once to hand off. The user must change it (or register a passkey)
  // on first login. Empty when the admin supplied the password directly.
  string temp_password = 2;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message ListUsersResponse {
  repeated User users = 1;
}

// MeResponse is the /api/v1/me payload. tenant_permissions enumerates
// every tenant-axis Action (from airlock/authz/policy.go) the caller's
// tenant role currently satisfies — the frontend uses this as the single
// source of truth for UI gating, replacing per-component role checks.
message MeResponse {
  User user = 1;
  repeated string tenant_permissions = 2;
}

message ListSelectableUsersResponse {
  repeated UserSummary users = 1;
}

message UpdateUserRoleRequest {
  string tenant_role = 1;
}

// --- Providers ---

message CreateProviderRequest {
  string provider_id = 1;
  string display_name = 2;
  string api_key = 3;
  string base_url = 4;
  // slug — required, kebab-case identifier unique within provider_id.
  // The frontend auto-derives from display_name; admins can override.
  string slug = 5;
}

message CreateProviderResponse {
  Provider provider = 1;
}

message ListProvidersResponse {
  repeated Provider providers = 1;
}

message UpdateProviderRequest {
  string display_name = 1;
  string api_key = 2;
  string base_url = 3;
  optional bool is_enabled = 4;
  // slug — empty string means "leave unchanged", any other value
  // renames the row's slug. Conflicts with another row sharing the
  // (provider_id, slug) tuple are surfaced as 409.
  string slug = 5;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

// --- Catalog ---

message ListCatalogProvidersResponse {
  repeated ProviderInfo providers = 1;
}

message ListCatalogModelsResponse {
  repeated ModelInfo models = 1;
}

// --- Agents ---

message CreateAgentRequest {
  string name = 1;
  string slug = 2;
  string description = 3;
  // build_model / exec_model carry the bare model name. The
  // accompanying *_provider_id binds the slot to a specific providers
  // row (multi-key support). Empty + empty ⇄ inherit system default.
  string build_model = 4;
  string exec_model = 5;
  string instructions = 6;
  string build_provider_id = 7;
  string exec_provider_id = 8;
  // Optional external git connection. When git_remote_url is set the
  // agent is attached to the remote on create and the scaffold +
  // codegen are pushed to it via the build pipeline.
  string git_remote_url = 9;
  string git_credential_id = 10;
  string git_default_branch = 11;  // empty → "main"
}

message CreateAgentResponse {
  AgentInfo agent = 1;
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

// GetAgentDetailResponse returns rich agent detail with connections, webhooks, schedules, and routes.
message GetAgentDetailResponse {
  AgentInfo agent = 1;
  repeated ConnectionInfo connections = 2;
  repeated WebhookInfo webhooks = 3;
  repeated ScheduleInfo schedules = 4;
  repeated RouteInfo routes = 5;
  // External base URL for the agent's registered routes
  // ({scheme}://{slug}.{agentDomain}[:port], no trailing slash). The UI
  // links GET routes to route_base_url + path. Server-built from env —
  // agent_domain is not client-derivable.
  string route_base_url = 6;
}

message UpdateAgentRequest {
  string description = 1;
  optional bool auto_fix = 2;
  // Model overrides moved to the dedicated /api/v1/agents/{id}/models endpoint.
  // Field numbers 3 and 4 intentionally left reserved to avoid re-use.
  reserved 3, 4;
  reserved "build_model", "exec_model";
  // Rename: omitted (null) leaves the field unchanged. slug must stay
  // unique and kebab-shaped; changing it re-points sibling agent_<slug>
  // bindings and any externally-configured MCP URL.
  optional string name = 5;
  optional string slug = 6;
}

message UpdateAgentResponse {
  AgentInfo agent = 1;
}

message UpgradeAgentRequest {
  string run_id = 1;      // optional — the failed run to fix
  string description = 2;  // optional — extra instructions for the upgrade
}

// RollbackBuildRequest targets a specific past build to roll back to.
// build_id must reference a completed build belonging to the agent.
// conversation_id is optional; when set, a single post-rollback message
// is posted into that conversation (mirroring upgrade's notifier).
message RollbackBuildRequest {
  string build_id = 1;
  string conversation_id = 2;
}

// --- Per-agent model configuration ---
//
// Three-tier resolution:
//   slot binding → per-agent capability override → system default.
// Empty strings on any override field mean "inherit the corresponding
// system default" (live, not snapshot).

message ModelSlotInfo {
  string slug = 1;                 // declared by agent code via RegisterModel
  string capability = 2;           // "text", "vision", "image", "speech", "transcription", "embedding"
  string description = 3;          // human-readable hint from the agent author
  // assigned_model carries the bare model name; assigned_provider_id
  // names the providers row to use. Empty + empty ⇄ fall through to
  // the capability default.
  string assigned_model = 4;
  string assigned_provider_id = 5;
}

message AgentModelConfig {
  // Per-agent capability overrides — mirror system_settings.default_*_*
  // 1:1. Each slot is two fields: bare model name + providers row UUID.
  string build_model = 1;
  string exec_model = 2;
  string stt_model = 3;
  string vision_model = 4;
  string tts_model = 5;
  string image_gen_model = 6;
  string embedding_model = 7;
  string search_model = 8;
  repeated ModelSlotInfo slots = 9;
  string build_provider_id = 10;
  string exec_provider_id = 11;
  string stt_provider_id = 12;
  string vision_provider_id = 13;
  string tts_provider_id = 14;
  string image_gen_provider_id = 15;
  string embedding_provider_id = 16;
  string search_provider_id = 17;
}

message GetAgentModelConfigResponse {
  AgentModelConfig config = 1;
}

message UpdateAgentModelConfigRequest {
  AgentModelConfig config = 1;
}

message UpdateAgentModelConfigResponse {
  AgentModelConfig config = 1;
}

// --- Builds ---

message ListAgentBuildsResponse {
  repeated AgentBuildInfo builds = 1;
}

message GetAgentBuildResponse {
  AgentBuildInfo build = 1;
}

// --- Runs ---

message ListRunsResponse {
  repeated RunInfo runs = 1;
  string next_cursor = 2;
}

message GetRunResponse {
  RunInfo run = 1;
  repeated AgentMessageInfo messages = 2; // Messages produced during this run.
}

// --- Conversations ---

message CreateConversationRequest {
  string title = 1;  // optional
}

message CreateConversationResponse {
  ConversationInfo conversation = 1;
}

message ListConversationsResponse {
  repeated ConversationInfo conversations = 1;
}

// One row of the merged sidebar feed (agent web conversations + system
// conversations), keyset-paginated newest-first.
message ConversationFeedItem {
  string kind = 1; // "agent" | "system"
  string id = 2;
  string agent_id = 3; // empty for system conversations
  string title = 4;
  google.protobuf.Timestamp updated_at = 5;
  string status = 6; // system conversations only (e.g. awaiting_confirmation)
}

message ListConversationFeedResponse {
  repeated ConversationFeedItem items = 1;
  // Opaque cursor for the next (older) page; empty when the end is reached.
  string next_cursor = 2;
}

message GetConversationResponse {
  ConversationInfo conversation = 1;
  repeated AgentMessageInfo messages = 2;
  PendingConfirmation pending_confirmation = 3; // Set when a run is suspended awaiting user approval.

  // has_older_messages is true when the conversation has messages older than
  // the first message in `messages`. The client uses this to decide whether
  // to enable scroll-up pagination via ListConversationMessages.
  bool has_older_messages = 4;

  // in_flight_run_id is set when a prompt run is currently in flight for
  // this conversation (status=running). Lets the client adopt the run id
  // even when it joined after the run.started WS event already fired —
  // without it, mid-flight WS deltas / completion events get filtered
  // out and the Cancel button stays disabled until a page refresh.
  string in_flight_run_id = 5;
}

// PaginatedMessagesResponse is the result of GET /api/v1/conversations/{convID}/messages
// — older or newer page for infinite-scroll chat history.
message PaginatedMessagesResponse {
  repeated AgentMessageInfo messages = 1;
  // has_more is true when additional messages exist past this page in the
  // direction of the query (older for `before`, newer for `after`).
  bool has_more = 2;
}

// PendingConfirmation describes a tool call awaiting user approval,
// reconstructed from a suspended run's checkpoint on conversation load.
message PendingConfirmation {
  string tool_call_id = 1;
  string tool_name = 2;
  string input = 3;  // JSON-encoded tool input (direct run_js confirmation)
  // permission/patterns/code carry the confirmation detail for a
  // delegated (A2A) suspension — a sub-agent's request_confirmation that
  // surfaced through promptAgent. Mirrors ConfirmationRequiredEvent so
  // the UI renders it the same as a live confirmation.
  string permission = 4;
  repeated string patterns = 5;
  string code = 6;
  // run_id is the suspended run this confirmation belongs to. The client
  // sends it back as resume_run_id on approve/deny so the backend resumes
  // THIS run rather than guessing the conversation's latest suspended one.
  // Carried here so a gate restored on conversation load (no live
  // confirmation_required event in hand) is still approvable.
  string run_id = 7;
  // description is the plain-language summary a run_js call carries, shown in
  // the confirmation card in place of the raw code/permission when present.
  string description = 8;
}

// --- Prompt ---

message PromptRequest {
  string conversation_id = 1;
  string message = 2;
  repeated string file_paths = 3;
  optional bool approved = 4; // Set by UI when responding to a confirmation request.
  // The exact run the UI is approving/denying — carried from the
  // confirmation event so the backend resumes that run instead of guessing
  // the conversation's latest suspended run. Required when `approved` is set.
  string resume_run_id = 5;
}

message PromptResponse {
  string run_id = 1;
  string conversation_id = 2;

  // command_reply is set when the message was a recognized slash command
  // (e.g. /clear) handled without invoking the agent. run_id is empty in
  // that case; the client should reload the conversation to pick up any
  // new system messages (like a checkpoint marker).
  string command_reply = 3;
}

// --- Webhooks & Schedules ---

message ListWebhooksResponse {
  repeated WebhookInfo webhooks = 1;
}

message ListSchedulesResponse {
  repeated ScheduleInfo schedules = 1;
}

message ListToolsResponse {
  repeated ToolInfo tools = 1;
}

message FireScheduleResponse {
  string run_id = 1;
}

// --- Agent Members ---

message AddAgentMemberRequest {
  string user_id = 1; // grantee principal id: a user, or the built-in `user` group (All users)
  string role = 2; // "admin" or "user"
}

message AgentMemberInfo {
  string user_id = 1; // grantee principal id (user or group)
  string email = 2;
  string display_name = 3;
  string role = 4;
  google.protobuf.Timestamp created_at = 5;
  string kind = 6; // grantee kind: "user" or "group"
}

message ListAgentMembersResponse {
  repeated AgentMemberInfo members = 1;
}

// --- Connections ---

message ListConnectionsResponse {
  repeated ConnectionInfo connections = 1;
  string oauth_callback_url = 2;  // redirect URI for OAuth app configuration
}

// --- Credentials ---

message SetAPIKeyRequest {
  string api_key = 1;
}

message SetOAuthAppRequest {
  string client_id = 1;
  string client_secret = 2;
}

message OAuthStartRequest {
  string agent_id = 1;
  string slug = 2;
  string redirect_uri = 3;
}

message OAuthStartResponse {
  string authorize_url = 1;
}

message CredentialStatusResponse {
  string slug = 1;
  string name = 2;
  string auth_mode = 3;
  bool authorized = 4;
  google.protobuf.Timestamp token_expires_at = 5;
}

message TestCredentialResponse {
  bool success = 1;
  int32 status_code = 2;
  string message = 3;
}

// --- Bridges ---

message CreateBridgeRequest {
  string agent_id = 1;
  reserved 2; // was name — a bridge's name is the bot's display name (getMe), never operator-set
  string token = 3;
  string type = 4; // "telegram"
  // Telegram manager-bot capability (admin only; requires the bot's
  // can_manage_bots to be enabled in BotFather). Telegram-only.
  bool is_manager = 5;
  // System bridge: routes inbound DMs to the airlock system agent (admin
  // only; agent_id must be empty). When false and agent_id is empty, the
  // bridge is created unbound (owner-scoped, routes nothing until bound).
  bool is_system = 6;
}

// Update fields on an existing bridge. Both fields are independent —
// callers can rebind the agent, edit settings, or do both in one
// request. A null/unset field leaves that aspect unchanged.
message UpdateBridgeRequest {
  string agent_id = 1;
  reserved 2; // was BridgeSettings settings (public-DM config removed)
  // Switch a bridge between the system-agent surface and an agent
  // surface. Optional: unset = leave as-is. Switching to system
  // requires the TenantBridgeSystem permission and forces agent_id
  // empty; switching away from system requires a non-empty agent_id.
  optional bool is_system = 3;
  // Toggle the Telegram manager-bot capability (admin only). Optional:
  // unset = leave as-is. Turning it on requires can_manage_bots.
  optional bool is_manager = 4;
}

message ListBridgesResponse {
  repeated BridgeInfo bridges = 1;
}

// --- Capabilities ---

message ListCapabilitiesResponse {
  repeated ProviderCapabilityInfo providers = 1;
}

// --- Platform Identity ---

message ListPlatformIdentitiesResponse {
  repeated PlatformIdentityInfo identities = 1;
}

// LinkIdentityPreviewResponse is returned by GET /api/v1/link-identity/preview
// so the frontend can show a confirmation dialog before linking. All fields
// are best-effort — display_name / username may be empty if the bridge can't
// fetch them from the platform.
message LinkIdentityPreviewResponse {
  string platform = 1;               // "telegram"
  string bridge_name = 2;            // Bridge display name from DB
  string bot_username = 3;           // @botname from bridges.bot_username
  string platform_user_id = 4;       // Platform-native user ID (Telegram chat_id)
  string platform_username = 5;      // @handle (may be empty)
  string platform_display_name = 6;  // Full / display name (may be empty)
  string current_user_email = 7;     // Airlock account being linked to
  string platform_avatar_url = 8;    // Avatar image URL (may be empty)
}

// --- Files ---

message ListFilesResponse {
  repeated FileInfo files = 1;
}

message UploadFileResponse {
  string upload_url = 1;
  string key = 2;
}

// --- Topics ---

message ListTopicsResponse {
  repeated TopicInfo topics = 1;
}

// --- System Settings ---

message GetSystemSettingsResponse {
  SystemSettingsInfo settings = 1;
}

message UpdateSystemSettingsRequest {
  SystemSettingsInfo settings = 1;
}

message UpdateSystemSettingsResponse {
  SystemSettingsInfo settings = 1;
}

// --- Errors ---

message ErrorResponse {
  string error = 1;
  string detail = 2;
}

// --- Git credentials ---

message CreateGitCredentialRequest {
  string type = 1;   // "pat" (v1)
  string name = 2;   // user-chosen label, unique per user
  string token = 3;  // plaintext PAT; encrypted on the backend
}

message CreateGitCredentialResponse {
  GitCredential credential = 1;
}

message ListGitCredentialsResponse {
  repeated GitCredential credentials = 1;
}

// --- Passkeys (WebAuthn) ---
//
// The begin/finish ceremony endpoints exchange raw WebAuthn JSON (the browser's
// attestation/assertion), not proto, so they have no messages here. These cover
// the management surface plus the register-finish response that returns the
// newly created passkey.

message ListPasskeysResponse {
  repeated Passkey passkeys = 1;
}

message RegisterPasskeyResponse {
  Passkey passkey = 1;
}

message RenamePasskeyRequest {
  string friendly_name = 1;  // id is a path param
}

message SetPasswordRequest {
  string password = 1;
}

// --- Agent git connection ---

message ConnectAgentGitRequest {
  string git_remote_url = 1;
  string git_credential_id = 2;
  string default_branch = 3;       // empty → "main"
}

message ConnectAgentGitResponse {
  AgentGitConfig config = 1;
}

message GetAgentGitConfigResponse {
  AgentGitConfig config = 1;
}

// --- MCP servers ---

message ListMCPServersResponse {
  repeated MCPServerInfo mcp_servers = 1;
  string oauth_callback_url = 2;
}

message MCPCredentialStatusResponse {
  MCPStatusInfo status = 1;
}

// --- Env vars ---

message ListEnvVarsResponse {
  repeated EnvVarInfo env_vars = 1;
}

message SetEnvVarValueRequest {
  string value = 1;
}

// --- Relay codes (short-lived auth handoff to agent subdomains) ---

message GenerateRelayCodeRequest {
  string return_url = 1;
}

message GenerateRelayCodeResponse {
  string code = 1;
  string callback_url = 2;
}

// --- Siblings (A2A) ---

message ListSiblingsResponse {
  repeated SiblingInfo siblings = 1;
}

message ListAddableSiblingsResponse {
  repeated AddableSiblingInfo agents = 1;
}

message GetAgentSharingResponse {
  A2ASettings settings = 1;
}

message UpdateAgentSharingRequest {
  A2ASettings settings = 1;
}

message UpdateAgentSharingResponse {
  A2ASettings settings = 1;
}

// --- Exec endpoints ---

message ListExecEndpointsResponse {
  repeated ExecEndpointInfo endpoints = 1;
}

message ConfigureExecEndpointRequest {
  string host = 1;
  int32 port = 2;
  string ssh_user = 3;
}

message ConfigureExecEndpointResponse {
  ExecEndpointInfo endpoint = 1;
}

message RotateExecKeypairResponse {
  ExecEndpointInfo endpoint = 1;
}

message TestExecEndpointResponse {
  ExecEndpointTestResult result = 1;
}

// --- Connection setup status ---

message ConnectionSetupStatusResponse {
  SetupCountsInfo counts = 1;
}

// --- Health ---

// HealthResponse reports the liveness/readiness of the airlock process and its
// hard dependencies (Postgres, S3). HTTP 200 means status="ok"; HTTP 503 means
// any dependency is down (per-subsystem booleans show which).
message HealthResponse {
  string status = 1;  // "ok" | "degraded"
  bool db = 2;        // Postgres reachable
  bool s3 = 3;        // S3/MinIO reachable
}

// ── Resource & model grants ──

// GrantResourceRequest shares a user-owned resource with a principal (a user id
// or a built-in role-group id). Gated by the manage capability on the resource.
message GrantResourceRequest {
  string resource_type = 1;  // connection | mcp_server | exec_endpoint | git_credential
  string resource_id = 2;
  string grantee_id = 3;
  repeated string capabilities = 4;  // subset of view | bind | manage
}

message ResourceGrantInfo {
  string grantee_id = 1;
  repeated string capabilities = 2;
}

message ListResourceGrantsResponse {
  repeated ResourceGrantInfo grants = 1;
}

// GrantModelRequest entitles a grantee to assign a (provider, model). Admin-only.
message GrantModelRequest {
  string provider_id = 1;
  string model = 2;
  string grantee_id = 3;
}

message ModelGrantInfo {
  string id = 1;
  string provider_id = 2;
  string provider_catalog = 3;  // catalog id (e.g. "openai")
  string provider_slug = 4;
  string model = 5;
  string grantee_id = 6;
}

message ListModelGrantsResponse {
  repeated ModelGrantInfo grants = 1;
}

// AllowedModel is one (provider row, model id) pair the caller may assign.
message AllowedModel {
  string provider_id = 1;
  string model = 2;
}

// ListAllowedModelsResponse is the model picker's allow-list. unrestricted=true
// (tenant admin) means any configured model may be assigned.
message ListAllowedModelsResponse {
  bool unrestricted = 1;
  repeated AllowedModel models = 2;
}

// ── Owner resource inventory (per-user Resources view) ──

// OwnedResourceInfo is one resource a principal owns, across all of their
// agents, with how many agents currently bind it. No secret material.
message OwnedResourceInfo {
  string id = 1;
  string type = 2;  // connection | mcp_server | exec_endpoint
  string slug = 3;
  string name = 4;
  string auth_mode = 5;
  bool authorized = 6;       // has usable credentials (or is configured, for exec)
  int32 agent_count = 7;     // how many of the owner's agents bind this resource
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp last_used_at = 9;
}

message ListOwnedResourcesResponse {
  repeated OwnedResourceInfo resources = 1;
}

// ── LLM spend ledger rollups (admin Usage view) ──

message UsageSummary {
  int64 calls = 1;
  int64 tokens_in = 2;
  int64 tokens_out = 3;
  int64 tokens_cached = 4;
  double cost_total = 5;
}

message UsageByAgent {
  string agent_slug = 1;
  string agent_name = 2;
  bool deleted = 3;  // the agent has since been deleted (snapshot identity)
  int64 calls = 4;
  int64 tokens_in = 5;
  int64 tokens_out = 6;
  int64 tokens_cached = 7;
  double cost_total = 8;
  // Current owner of the agent (agents.owner_principal_id), joined live. Empty
  // when the agent — or its owner — has since been deleted.
  string owner_email = 9;
  string owner_name = 10;
}

// Spend grouped by the user who triggered the calls (the run's caller,
// snapshotted on the ledger row), not the agent owner.
message UsageByUser {
  string user_email = 1;
  bool deleted = 2;  // the user has since been deleted (snapshot identity)
  int64 calls = 3;
  int64 tokens_in = 4;
  int64 tokens_out = 5;
  int64 tokens_cached = 6;
  double cost_total = 7;
}

message UsageByModel {
  string provider_catalog_id = 1;
  string model = 2;
  int64 calls = 3;
  int64 tokens_in = 4;
  int64 tokens_out = 5;
  double cost_total = 6;
  string provider_slug = 7;  // the configured provider row; distinguishes co-catalog rows
}

message GetUsageResponse {
  UsageSummary summary = 1;
  repeated UsageByAgent by_agent = 2;
  repeated UsageByModel by_model = 3;
  int32 window_days = 4;  // window the rollup covers; 0 = all time
  repeated UsageByUser by_user = 5;
}

// ── Resource needs (agent manifest) + binding ──

message NeedInfo {
  string type = 1;  // connection | mcp_server | exec_endpoint
  string slug = 2;
  string description = 3;
  bool bound = 4;
  string bound_resource_id = 5;
}

message ListNeedsResponse {
  repeated NeedInfo needs = 1;
}

// CandidateInfo is an existing resource whose shape matches a need (bindable for reuse).
message CandidateInfo {
  string resource_id = 1;
  string name = 2;
  string slug = 3;
}

message ListCandidatesResponse {
  repeated CandidateInfo candidates = 1;
}

message BindNeedRequest {
  string resource_id = 1;
}

message CreateForNeedResponse {
  string resource_id = 1;
}
