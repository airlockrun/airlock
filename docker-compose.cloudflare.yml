# Mode B overlay: Cloudflare DNS-01 wildcard TLS.
#   docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d --build
#
# Swaps the reverse-proxy caddy to a build with the Cloudflare DNS plugin and
# the wildcard Caddyfile, and passes the CF API token. The frontend's caddy is
# untouched. `!override` on volumes replaces the base Caddyfile mount.
services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: airlock-caddy-cloudflare:local
    environment:
      DOMAIN: ${DOMAIN}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for the Cloudflare wildcard mode}
    volumes: !override
      - ./Caddyfile.wildcard:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
