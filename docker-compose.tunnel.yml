# Mode C overlay: Cloudflare Tunnel (no public IP needed).
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
#
# cloudflared dials out to Cloudflare with a tunnel token and forwards public
# hostnames to caddy over the tunnel; CF terminates TLS at its edge. caddy
# serves plain HTTP and publishes NO host ports — all ingress arrives via the
# tunnel. Configure the tunnel's public-hostname routes (CF Zero-Trust
# dashboard) to point DOMAIN / *.DOMAIN / s3.DOMAIN at http://caddy:80.
services:
  caddy:
    # No host ports — ingress is the tunnel only.
    ports: !override []
    volumes: !override
      - ./Caddyfile.tunnel:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN:?TUNNEL_TOKEN is required for the Cloudflare Tunnel mode}"]
    depends_on:
      caddy:
        condition: service_started
    restart: unless-stopped
    networks: [default]
